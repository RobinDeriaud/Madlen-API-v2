<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0A2540; margin: 0; padding: 0;">
  <div style="max-width: 500px; margin: 0 auto;">
    <!-- Header avec logo -->
    <div style="padding: 50px 20px 15px; text-align: left;">
      <h1 style="color: #ffffff; font-size: 30px; font-weight: 600; letter-spacing: -0.5px; margin: 0;">MADLEN</h1>
    </div>

    <!-- Card blanche -->
    <div style="background-color: #ffffff; border-radius: 12px; margin: 0 10px 20px; padding: 40px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
      <h2 style="color: #0A2540; font-size: 20px; font-weight: 600; margin: 0 0 16px 0;">Nouvel achat</h2>

      <p style="color: #425466; font-size: 14px; line-height: 1.5; margin: 0 0 16px 0;">
        Un nouvel utilisateur vient d'effectuer un achat sur MADLEN.
      </p>

      <div style="background-color: #F6F9FC; border-radius: 8px; padding: 16px; margin: 0 0 16px 0;">
        <p style="color: #425466; font-size: 13px; line-height: 1.8; margin: 0;">
          <strong>Client :</strong> {{CLIENT_NOM}}<br>
          <strong>Email :</strong> {{CLIENT_EMAIL}}<br>
          <strong>Produit :</strong> {{PRODUCT_NAME}}<br>
          <strong>Montant :</strong> {{AMOUNT}}
        </p>
      </div>

      {{KIT_SECTION}}

      <!-- Bouton -->
      <div style="text-align: center; margin: 24px 0;">
        <a href="{{ADMIN_URL}}" style="display: inline-block; background-color: #00D4AA; color: #ffffff; padding: 12px 24px; text-decoration: none; font-weight: 500; font-size: 14px; border-radius: 6px;">
          Accéder au panel admin
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div style="padding: 0 40px 60px; text-align: center;">
      <p style="color: #6B7C93; font-size: 11px; margin: 0;">
        © 2025 MADLEN - AMS-Logophonie - Tous droits réservés
      </p>
    </div>
  </div>
</div>
